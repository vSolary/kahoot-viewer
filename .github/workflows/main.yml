name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython requests kivy
    - name: Build with Buildozer
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/package.name = myapp/package.name = kahootmaster/g' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.vsolary/g' buildozer.spec
          sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,html/g' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,requests,urllib3,certifi,idna,charset-normalizer/g' buildozer.spec
          sed -i 's/#android.permissions = INTERNET/android.permissions = INTERNET/g' buildozer.spec
          sed -i 's/orientation = landscape/orientation = portrait/g' buildozer.spec
        fi
        buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: KahootMaster-APK
        path: bin/*.apk
