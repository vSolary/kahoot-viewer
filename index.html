<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - API/v1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
            --correct: #10b981;
        }

        /* Modalità Stealth */
        body.stealth {
            background-color: white !important;
            color: black !important;
        }

        body.stealth .question-card {
            background: none !important;
            border: none !important;
            color: black !important;
            box-shadow: none !important;
            padding: 10px 0 !important;
        }

        body.stealth h1,
        body.stealth .status,
        body.stealth .q-number {
            color: #666 !important;
            background: none !important;
            -webkit-text-fill-color: initial !important;
        }

        body.stealth .answer.correct {
            border: 1px solid #ccc !important;
            background: #f9f9f9 !important;
            color: #d32f2f !important;
            /* Diventa rosso per confondere se qualcuno guarda da lontano */
            font-weight: bold;
        }

        body.stealth .answer.correct .answer-icon {
            background: #d32f2f !important;
            color: white !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: all 0.2s ease;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--glass);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .status {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
        }

        #quiz-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .question-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .q-number {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .q-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .answers {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .answer {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }

        .answer.correct-0 {
            /* Triangolo Rosso */
            background: rgba(226, 27, 60, 0.1);
            border: 1px solid #e21b3c;
            color: #e21b3c;
        }

        .answer.correct-0 .answer-icon {
            background: #e21b3c;
            color: white;
        }

        .answer.correct-1 {
            /* Rombo Blu */
            background: rgba(19, 104, 206, 0.1);
            border: 1px solid #1368ce;
            color: #1368ce;
        }

        .answer.correct-1 .answer-icon {
            background: #1368ce;
            color: white;
        }

        .answer.correct-2 {
            /* Cerchio Giallo */
            background: rgba(216, 158, 0, 0.1);
            border: 1px solid #d89e00;
            color: #d89e00;
        }

        .answer.correct-2 .answer-icon {
            background: #d89e00;
            color: white;
        }

        .answer.correct-3 {
            /* Quadrato Verde */
            background: rgba(38, 137, 12, 0.1);
            border: 1px solid #26890c;
            color: #26890c;
        }

        .answer.correct-3 .answer-icon {
            background: #26890c;
            color: white;
        }

        .answer-icon {
            margin-right: 15px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
        }

        .loading {
            text-align: center;
            padding: 100px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .question-card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header id="quiz-header">
            <h1 id="title">System Logs / Main</h1>
            <p class="status" id="quiz-status">Press [S] for Stealth Mode</p>
        </header>

        <div id="quiz-content">
            <div class="loading" id="loader">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <script>
        // Modalità Stealth premendo 'S'
        document.addEventListener('keydown', (e) => {
            if (e.key === 's' || e.key === 'S') {
                document.body.classList.toggle('stealth');
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const uuid = urlParams.get('uuid');

            if (!uuid) return;

            const proxies = [
                "https://api.allorigins.win/raw?url=",
                "https://corsproxy.io/?",
                "https://thingproxy.freeboard.io/fetch/"
            ];

            let success = false;
            for (let proxy of proxies) {
                if (success) break;
                try {
                    const targetUrl = `https://create.kahoot.it/rest/kahoots/${uuid}`;
                    const response = await fetch(proxy + encodeURIComponent(targetUrl));
                    if (response.ok) {
                        const data = await response.json();
                        renderQuiz(data);
                        success = true;
                    }
                } catch (e) {
                    console.error(`Proxy ${proxy} fallito, provo il prossimo...`);
                }
            }

            if (!success) {
                document.getElementById('quiz-status').innerText = "ERRORE CONNESSIONE - DATABASE BLOCCATO";
            }
        });

        function renderQuiz(data) {
            document.getElementById('title').innerText = data.title || "Quiz Senza Titolo";
            document.getElementById('quiz-status').innerText = `${data.questions.length} Domande Trovate`;
            document.getElementById('loader').style.display = 'none';

            const content = document.getElementById('quiz-content');

            data.questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                const choicesHtml = q.choices.map((c, i) => `
                    <div class="answer ${c.correct ? 'correct correct-' + (i % 4) : ''}">
                        <div class="answer-icon">${c.correct ? '✓' : '•'}</div>
                        <div class="answer-text">${c.answer || "Risposta multimediale"}</div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="q-number">DOMANDA ${index + 1}</div>
                    <div class="q-text">${q.question}</div>
                    <div class="answers">
                        ${choicesHtml}
                    </div>
                `;
                content.appendChild(card);
            });
        }

        function showError(title, msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('title').innerText = title;
            document.getElementById('quiz-status').innerText = msg;
        }
    </script>
</body>

</html>
